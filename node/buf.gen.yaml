version: v2
clean: true

inputs:
  - directory: ../protobuf
plugins:
  - local: protoc-gen-es
    opt: target=ts
    out: ./src/gen
  - local: ["npx", "tsx", "../generate/src/protoc-gen-olvid-client.ts"]
    opt: target=ts
    out: ./src/gen
  - local: ["npx", "tsx", "../generate/src/protoc-gen-barrels.ts"]
    opt: target=ts
    out: ./src/gen
  - local: ["npx", "tsx", "../generate/src/protoc-gen-decorators.ts"]
    opt: target=ts
    out: ./src/gen
